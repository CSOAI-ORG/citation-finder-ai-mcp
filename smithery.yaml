name: citation-finder-ai-mcp
description: MCP server for citation finder ai. Features format citation, generate
  bibtex, parse citation. From MEOK AI Labs.
version: 1.0.0
tools:
- name: format_citation
  description: MEOK AI Labs tool.
  parameters:
  - name: title
    type: string
    required: true
  - name: authors
    type: string
    required: true
  - name: year
    type: integer
    required: true
  - name: style
    type: string
    required: false
- name: generate_bibtex
  description: MEOK AI Labs tool.
  parameters:
  - name: title
    type: string
    required: true
  - name: authors
    type: string
    required: true
  - name: year
    type: integer
    required: true
  - name: journal
    type: string
    required: false
- name: parse_citation
  description: MEOK AI Labs tool.
  parameters:
  - name: citation_text
    type: string
    required: true
- name: validate_doi
  description: MEOK AI Labs tool.
  parameters:
  - name: doi
    type: string
    required: true
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
    - apiKey
    properties:
      apiKey:
        type: string
        description: Your MEOK API Key
  commandFunction: "(config) => ({\n  command: 'uvx',\n  args: ['citation-finder-ai-mcp',\
    \ '--api-key', config.apiKey],\n  env: {\n    MEOK_API_KEY: config.apiKey\n  }\n\
    })"
